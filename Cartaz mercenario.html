```html
<!doctype html>
<html lang="pt-br">

<head>
<meta charset="utf-8"/>

<title>CARTAZ GUILDA DOS MERCENÁRIOS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
background:#0b1220;
font-family:system-ui;
margin:0;
display:flex;
justify-content:center;
}

.wrap{
width:1200px;
display:grid;
grid-template-columns:400px 1fr;
gap:20px;
margin-top:20px;
}

.panel{
background:#0f1a2d;
padding:16px;
border-radius:12px;
color:white;
}

label{
font-size:13px;
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:4px;
background:#08101e;
border:1px solid #263248;
color:white;
border-radius:8px;
text-transform:uppercase;
}

canvas{
width:720px;
border-radius:10px;
cursor:grab;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#5f4d1c;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.btnSmall{
background:#1b3a5a;
}

</style>
</head>

<body>

<div class="wrap">

<div class="panel">

<label>IMAGEM DO ALVO</label>
<input id="portrait" type="file">

<label>ZOOM</label>
<input id="zoom" type="range" min="0.4" max="3" step="0.01" value="1.1">

<label>ROTAÇÃO</label>
<input id="rot" type="range" min="-180" max="180" step="1" value="0">

<button id="centerImg" class="btnSmall">CENTRALIZAR IMAGEM</button>
<button id="resetImg" class="btnSmall">RESETAR IMAGEM</button>

<label>ALCUNHA</label>
<input id="alias">

<label>STATUS</label>
<select id="status">
<option>VIVO</option>
<option>MORTO</option>
<option>TANTO FAZ</option>
</select>

<label>ÚLTIMA REGIÃO</label>
<input id="region">

<label>RECOMPENSA</label>
<input id="rewardNumber">

<label>CÓDIGO</label>
<input id="code" value="CG-1A-77F2">

<label>CARIMBO</label>

<select id="stampSelect">
<option value="">NENHUM</option>
<option value="stamp1.png">CARIMBO 1</option>
<option value="stamp2.png">CARIMBO 2</option>
<option value="stamp3.png">CARIMBO 3</option>
<option value="stamp4.png">CARIMBO 4</option>
<option value="stamp5.png">CARIMBO 5</option>
<option value="stamp6.png">CARIMBO 6</option>
<option value="stamp7.png">CARIMBO 7</option>
<option value="stamp8.png">CARIMBO 8</option>
</select>

<button id="download">BAIXAR CARTAZ</button>
<button onclick="window.location.href='index.html'" class="btnSmall">VOLTAR AO MENU</button>

</div>

<div class="panel">
<canvas id="canvas" width="1536" height="2048"></canvas>
</div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const $ = id => document.getElementById(id)

let portraitImg = null
let stampImg = null

let templateImg = new Image()
templateImg.src = "TempleteMercenario.png"

const imgState = {x:0,y:0,scale:1.1,rot:0}

function upper(t){ return (t||"").toUpperCase() }

/* SISTEMA ROMANO COM SUBTRAÇÃO */

const SYMBOLS = [

{sym:"☠︎", val:5000000000},

{sym:"✙☠︎", val:4000000000},
{sym:"✙", val:1000000000},

{sym:"卍✙", val:900000000},
{sym:"卍", val:500000000},

{sym:"☭卍", val:400000000},
{sym:"☭", val:100000000},

{sym:"ω☭", val:90000000},
{sym:"ω", val:50000000},

{sym:"ᦂω", val:40000000},
{sym:"ᦂ", val:10000000},

{sym:"✰ᦂ", val:9000000},
{sym:"✰", val:5000000},

{sym:"✯✰", val:4000000},
{sym:"✯", val:1000000},

{sym:"✥✯", val:900000},
{sym:"✥", val:500000},

{sym:"❉✥", val:400000},
{sym:"❉", val:100000},

{sym:"⊛❉", val:90000},
{sym:"⊛", val:50000},

{sym:"✹⊛", val:40000},
{sym:"✹", val:10000},

{sym:"♛✹", val:9000},
{sym:"♛", val:5000},

{sym:"◘♛", val:4000},
{sym:"◘", val:1000},

{sym:"☼◘", val:900},
{sym:"☼", val:500},

{sym:"○☼", val:400},
{sym:"○", val:100},

{sym:"¤○", val:90},
{sym:"¤", val:50},

{sym:"⊗¤", val:40},
{sym:"⊗", val:10},

{sym:"♡⊗", val:9},
{sym:"♡", val:5},

{sym:"♥♡", val:4},
{sym:"♥", val:1}

]

function toSymbols(n){

let raw = String(n).replace(/[^\d]/g,"")
let num = parseInt(raw)

if(!num) return ""

let out=""

for(let s of SYMBOLS){

while(num >= s.val){
out += s.sym
num -= s.val
}

}

return out

}

/* CARREGAR IMAGEM */

function loadImage(file){

return new Promise(res=>{

const url=URL.createObjectURL(file)
const img=new Image()

img.onload=()=>res(img)
img.src=url

})

}

$("portrait").onchange=async e=>{
portraitImg=await loadImage(e.target.files[0])
render()
}

$("zoom").oninput=e=>{
imgState.scale=parseFloat(e.target.value)
render()
}

$("rot").oninput=e=>{
imgState.rot=parseFloat(e.target.value)
render()
}

$("centerImg").onclick=()=>{
imgState.x=0
imgState.y=0
render()
}

$("resetImg").onclick=()=>{
imgState.x=0
imgState.y=0
imgState.scale=1.1
imgState.rot=0
$("zoom").value=1.1
$("rot").value=0
render()
}

$("stampSelect").onchange=e=>{

if(!e.target.value){
stampImg=null
render()
return
}

const img=new Image()
img.src=e.target.value
img.onload=()=>{stampImg=img;render()}

}

function getPhotoRect(){

return{
x:canvas.width*0.16,
y:canvas.height*0.24,
w:canvas.width*0.68,
h:canvas.height*0.44
}

}

function drawPortrait(){

if(!portraitImg)return

const rect=getPhotoRect()
const cx=rect.x+rect.w/2
const cy=rect.y+rect.h/2

ctx.save()

ctx.beginPath()
ctx.rect(rect.x,rect.y,rect.w,rect.h)
ctx.clip()

ctx.translate(cx+imgState.x,cy+imgState.y)
ctx.rotate(imgState.rot*Math.PI/180)
ctx.scale(imgState.scale,imgState.scale)

ctx.drawImage(portraitImg,-rect.w/2,-rect.h/2,rect.w,rect.h)

ctx.restore()

}

function drawStamp(){

if(!stampImg)return

const size=canvas.width*0.25

ctx.save()
ctx.globalAlpha=0.9
ctx.globalCompositeOperation="multiply"

ctx.drawImage(
stampImg,
canvas.width*0.03,
canvas.height*0.73,
size,
size
)

ctx.restore()

}

/* TEXTO */

function drawReward(){

let text = toSymbols($("rewardNumber").value)

let fontSize = 60

ctx.textAlign="center"

if(text.length <= 18){

ctx.font="700 "+fontSize+"px Playfair Display"

ctx.fillText(
text,
canvas.width/2,
canvas.height*0.83
)

}else{

let line1 = text.slice(0,18)
let line2 = text.slice(18)

fontSize -= 2

ctx.font="700 "+fontSize+"px Playfair Display"

ctx.fillText(
line1,
canvas.width/2,
canvas.height*0.81
)

ctx.fillText(
line2,
canvas.width/2,
canvas.height*0.86
)

}

}

function drawText(){

ctx.fillStyle="#2a1a10"

ctx.font="700 38px Libre Baskerville"
ctx.fillText(upper($("alias").value), canvas.width*0.34, canvas.height*0.229)

ctx.fillText(upper($("status").value), canvas.width*0.30, canvas.height*0.275)

ctx.fillText(upper($("region").value), canvas.width*0.44, canvas.height*0.315)

drawReward()

ctx.textAlign="left"

ctx.font="700 26px Libre Baskerville"
ctx.fillText(upper($("code").value), canvas.width*0.06, canvas.height*0.965)

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPortrait()
ctx.drawImage(templateImg,0,0,canvas.width,canvas.height)
drawText()
drawStamp()

}

let dragging=false

canvas.onmousedown=e=>{dragging=true}
window.onmouseup=()=>dragging=false

window.onmousemove=e=>{
if(!dragging)return
imgState.x+=e.movementX*2
imgState.y+=e.movementY*2
render()
}

$("download").onclick=()=>{

const a=document.createElement("a")
a.href=canvas.toDataURL("image/png")
a.download="cartaz-mercenario.png"
a.click()

}

templateImg.onload=render

</script>

</body>
</html>
