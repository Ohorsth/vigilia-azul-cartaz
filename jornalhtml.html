<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco dos Marés - Editor</title>

  <style>
    :root{
      --page-width: 900px;
      --page-height: 1400px;

      /* título mais para baixo */
      --title-top: 340px;
      --title-left: 110px;
      --title-width: 680px;

      /* imagem */
      --image-top: 420px;
      --image-left: 60px;
      --image-width: 780px;
      --image-height: 400px;

      /* texto mais para baixo */
      --text-top: 910px;
      --text-left: 80px;
      --text-width: 740px;
      --text-height: 360px;
    }

    *{
      box-sizing: border-box;
    }

    body{
      margin: 0;
      padding: 24px;
      background: #1a1a1a;
      font-family: Georgia, "Times New Roman", serif;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .toolbar{
      width: min(100%, 1200px);
      background: #f3f3f3;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .control{
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control label{
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .control input[type="text"],
    .control input[type="file"],
    .control textarea,
    .control input[type="range"]{
      width: 100%;
    }

    .control textarea{
      min-height: 120px;
      resize: vertical;
      padding: 10px;
      font-size: 14px;
    }

    .control input[type="text"]{
      padding: 10px;
      font-size: 14px;
    }

    .range-value{
      font-size: 12px;
      color: #444;
    }

    .actions{
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    .page-wrap{
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .page{
      position: relative;
      width: var(--page-width);
      height: var(--page-height);
      background: url("jornal.png") center center / cover no-repeat;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
      overflow: hidden;
    }

    .headline{
      position: absolute;
      top: var(--title-top);
      left: var(--title-left);
      width: var(--title-width);
      text-align: center;
      font-family: "Times New Roman", Georgia, serif;
      font-weight: 700;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: 0.5px;
      color: #111;
      text-transform: uppercase;
      background: transparent;
      border: none;
      outline: none;
      overflow: hidden;
      z-index: 3;
    }

    .headline[contenteditable="true"]:empty::before{
      content: "DIGITE O TÍTULO AQUI";
      color: rgba(0,0,0,.45);
    }

    .photo-frame{
      position: absolute;
      top: var(--image-top);
      left: var(--image-left);
      width: var(--image-width);
      height: var(--image-height);
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      border: 2px solid rgba(0,0,0,0.10);
    }

    .photo-inner{
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-frame img{
      position: absolute;
      top: 50%;
      left: 50%;
      width: auto;
      height: auto;
      min-width: 100%;
      min-height: 100%;
      max-width: none;
      max-height: none;
      display: none;
      transform-origin: center center;
      user-select: none;
      pointer-events: none;
    }

    .photo-placeholder{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(0,0,0,.2);
      color: rgba(0,0,0,.4);
      font-size: 18px;
      text-align: center;
      padding: 20px;
    }

    .article-text{
      position: absolute;
      top: var(--text-top);
      left: var(--text-left);
      width: var(--text-width);
      height: var(--text-height);
      font-size: 23px;
      line-height: 1.55;
      color: #111;
      text-align: justify;
      column-count: 2;
      column-gap: 34px;
      column-fill: auto;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 3;
    }

    .article-text[contenteditable="true"]:empty::before{
      content: "Digite o texto da matéria aqui...";
      color: rgba(0,0,0,.45);
    }

    button{
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover{
      opacity: .92;
    }

    .btn-secondary{
      background: #3b3b3b;
    }

    .btn-download{
      background: #0d5f2f;
    }

    .btn-back{
      background: #1b3a5a;
    }

    @media (max-width: 980px){
      body{
        padding: 12px;
      }

      .page{
        transform: scale(.8);
        transform-origin: top center;
        margin-bottom: -280px;
      }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="control">
      <label for="tituloInput">Título</label>
      <input type="text" id="tituloInput" placeholder="Digite o título da matéria">
    </div>

    <div class="control">
      <label for="imagemInput">Escolher imagem</label>
      <input type="file" id="imagemInput" accept="image/*">
    </div>

    <div class="control">
      <label for="sepiaRange">Filtro sépia</label>
      <input type="range" id="sepiaRange" min="0" max="100" value="0">
      <div class="range-value"><span id="sepiaValue">0</span>%</div>
    </div>

    <div class="control">
      <label for="zoomRange">Zoom da imagem</label>
      <input type="range" id="zoomRange" min="50" max="250" value="100">
      <div class="range-value"><span id="zoomValue">100</span>%</div>
    </div>

    <div class="control">
      <label for="rotateRange">Rotação</label>
      <input type="range" id="rotateRange" min="-180" max="180" value="0">
      <div class="range-value"><span id="rotateValue">0</span>°</div>
    </div>

    <div class="control">
      <label for="offsetXRange">Mover imagem horizontal</label>
      <input type="range" id="offsetXRange" min="-300" max="300" value="0">
      <div class="range-value"><span id="offsetXValue">0</span>px</div>
    </div>

    <div class="control">
      <label for="offsetYRange">Mover imagem vertical</label>
      <input type="range" id="offsetYRange" min="-300" max="300" value="0">
      <div class="range-value"><span id="offsetYValue">0</span>px</div>
    </div>

    <div class="control">
      <label for="textoInput">Texto da matéria</label>
      <textarea id="textoInput" placeholder="Escreva a notícia aqui..."></textarea>
    </div>

    <div class="control">
      <label>Ações</label>
      <div class="actions">
        <button id="voltarIndex" class="btn-back" type="button">Voltar</button>
        <button id="baixarJornal" class="btn-download" type="button">Baixar jornal</button>
        <button id="resetImagem" class="btn-secondary" type="button">Resetar imagem</button>
        <button id="limparImagem" class="btn-secondary" type="button">Remover imagem</button>
      </div>
    </div>
  </div>

  <div class="page-wrap">
    <div class="page" id="page">
      <div id="headline" class="headline" contenteditable="true"></div>

      <div class="photo-frame">
        <div class="photo-inner">
          <div id="placeholder" class="photo-placeholder">
            Espaço para imagem
          </div>
          <img id="previewImage" alt="Imagem da matéria">
        </div>
      </div>

      <div id="articleText" class="article-text" contenteditable="true"></div>
    </div>
  </div>

  <script>
    const tituloInput = document.getElementById("tituloInput");
    const textoInput = document.getElementById("textoInput");
    const imagemInput = document.getElementById("imagemInput");
    const sepiaRange = document.getElementById("sepiaRange");
    const zoomRange = document.getElementById("zoomRange");
    const rotateRange = document.getElementById("rotateRange");
    const offsetXRange = document.getElementById("offsetXRange");
    const offsetYRange = document.getElementById("offsetYRange");

    const sepiaValue = document.getElementById("sepiaValue");
    const zoomValue = document.getElementById("zoomValue");
    const rotateValue = document.getElementById("rotateValue");
    const offsetXValue = document.getElementById("offsetXValue");
    const offsetYValue = document.getElementById("offsetYValue");

    const previewImage = document.getElementById("previewImage");
    const placeholder = document.getElementById("placeholder");
    const headline = document.getElementById("headline");
    const articleText = document.getElementById("articleText");
    const limparImagem = document.getElementById("limparImagem");
    const resetImagem = document.getElementById("resetImagem");
    const baixarJornal = document.getElementById("baixarJornal");
    const voltarIndex = document.getElementById("voltarIndex");

    let imageState = {
      sepia: 0,
      zoom: 100,
      rotate: 0,
      offsetX: 0,
      offsetY: 0
    };

    function updateImageTransform(){
      previewImage.style.filter = `sepia(${imageState.sepia}%)`;
      previewImage.style.transform =
        `translate(calc(-50% + ${imageState.offsetX}px), calc(-50% + ${imageState.offsetY}px)) scale(${imageState.zoom / 100}) rotate(${imageState.rotate}deg)`;

      sepiaValue.textContent = imageState.sepia;
      zoomValue.textContent = imageState.zoom;
      rotateValue.textContent = imageState.rotate;
      offsetXValue.textContent = imageState.offsetX;
      offsetYValue.textContent = imageState.offsetY;
    }

    function resetImageControls(){
      imageState = {
        sepia: 0,
        zoom: 100,
        rotate: 0,
        offsetX: 0,
        offsetY: 0
      };

      sepiaRange.value = 0;
      zoomRange.value = 100;
      rotateRange.value = 0;
      offsetXRange.value = 0;
      offsetYRange.value = 0;

      updateImageTransform();
    }

    tituloInput.addEventListener("input", () => {
      headline.textContent = tituloInput.value;
    });

    textoInput.addEventListener("input", () => {
      articleText.textContent = textoInput.value;
    });

    headline.addEventListener("input", () => {
      tituloInput.value = headline.textContent.trim();
    });

    articleText.addEventListener("input", () => {
      textoInput.value = articleText.textContent;
    });

    imagemInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        previewImage.style.display = "block";
        placeholder.style.display = "none";
        resetImageControls();
      };
      reader.readAsDataURL(file);
    });

    sepiaRange.addEventListener("input", () => {
      imageState.sepia = Number(sepiaRange.value);
      updateImageTransform();
    });

    zoomRange.addEventListener("input", () => {
      imageState.zoom = Number(zoomRange.value);
      updateImageTransform();
    });

    rotateRange.addEventListener("input", () => {
      imageState.rotate = Number(rotateRange.value);
      updateImageTransform();
    });

    offsetXRange.addEventListener("input", () => {
      imageState.offsetX = Number(offsetXRange.value);
      updateImageTransform();
    });

    offsetYRange.addEventListener("input", () => {
      imageState.offsetY = Number(offsetYRange.value);
      updateImageTransform();
    });

    resetImagem.addEventListener("click", () => {
      resetImageControls();
    });

    limparImagem.addEventListener("click", () => {
      previewImage.src = "";
      previewImage.style.display = "none";
      placeholder.style.display = "flex";
      imagemInput.value = "";
      resetImageControls();
    });

    voltarIndex.addEventListener("click", () => {
      location.href = "index.html";
    });

    baixarJornal.addEventListener("click", async () => {
      try {
        const canvas = document.createElement("canvas");
        const scale = 2;
        canvas.width = 900 * scale;
        canvas.height = 1400 * scale;

        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);

        const bg = new Image();
        bg.src = "jornal.png";

        await new Promise((resolve, reject) => {
          bg.onload = resolve;
          bg.onerror = reject;
        });

        ctx.drawImage(bg, 0, 0, 900, 1400);

        if (previewImage.src && previewImage.style.display !== "none") {
          const img = new Image();
          img.src = previewImage.src;

          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
          });

          const frameX = 60;
          const frameY = 420;
          const frameW = 780;
          const frameH = 400;

          ctx.save();
          ctx.beginPath();
          ctx.rect(frameX, frameY, frameW, frameH);
          ctx.clip();

          const centerX = frameX + frameW / 2 + imageState.offsetX;
          const centerY = frameY + frameH / 2 + imageState.offsetY;

          ctx.translate(centerX, centerY);
          ctx.rotate(imageState.rotate * Math.PI / 180);
          ctx.scale(imageState.zoom / 100, imageState.zoom / 100);

          ctx.filter = `sepia(${imageState.sepia}%)`;

          const drawW = frameW;
          const drawH = frameH;

          ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
          ctx.filter = "none";
          ctx.restore();
        }

        ctx.fillStyle = "#111";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.font = "700 34px 'Times New Roman'";

        drawWrappedCenteredText(ctx, (headline.textContent || "").toUpperCase(), 450, 340, 680, 36);

        drawColumnsText(
          ctx,
          articleText.textContent || "",
          80, 910, 740, 360,
          2, 34,
          23, 1.55,
          "Georgia"
        );

        const link = document.createElement("a");
        link.download = "eco-dos-mares.png";
        link.href = canvas.toDataURL("image/png");
        link.click();

      } catch (error) {
        alert("Erro ao baixar o jornal. Confirme se jornal.png está na mesma pasta.");
        console.error(error);
      }
    });

    function drawWrappedCenteredText(ctx, text, centerX, startY, maxWidth, lineHeight){
      const words = text.split(" ");
      let line = "";
      let y = startY;

      for (let i = 0; i < words.length; i++) {
        const testLine = line + words[i] + " ";
        if (ctx.measureText(testLine).width > maxWidth && i > 0) {
          ctx.fillText(line.trim(), centerX, y);
          line = words[i] + " ";
          y += lineHeight;
        } else {
          line = testLine;
        }
      }

      if (line.trim()) {
        ctx.fillText(line.trim(), centerX, y);
      }
    }

    function drawColumnsText(ctx, text, x, y, width, height, columns, gap, fontSize, lineHeightMult, fontFamily){
      const colWidth = (width - gap * (columns - 1)) / columns;
      const lineHeight = fontSize * lineHeightMult;

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillStyle = "#111";
      ctx.font = `${fontSize}px ${fontFamily}`;

      const paragraphs = text.split("\n");
      const lines = [];

      paragraphs.forEach(paragraph => {
        if (paragraph.trim() === "") {
          lines.push("");
          return;
        }

        const words = paragraph.split(" ");
        let line = "";

        for (let i = 0; i < words.length; i++) {
          const testLine = line + words[i] + " ";
          if (ctx.measureText(testLine).width > colWidth && i > 0) {
            lines.push(line.trim());
            line = words[i] + " ";
          } else {
            line = testLine;
          }
        }

        if (line.trim()) {
          lines.push(line.trim());
        }

        lines.push("");
      });

      let col = 0;
      let currentY = y;

      for (let i = 0; i < lines.length; i++) {
        if (currentY + lineHeight > y + height) {
          col++;
          currentY = y;
        }

        if (col >= columns) break;

        const drawX = x + col * (colWidth + gap);
        ctx.fillText(lines[i], drawX, currentY);
        currentY += lineHeight;
      }
    }

    updateImageTransform();
  </script>
</body>
</html>
