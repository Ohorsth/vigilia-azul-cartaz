<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco dos Marés - Editor</title>

  <style>
    :root{
      --page-width: 900px;
      --page-height: 1400px;

      /* posição do título */
      --title-top: 245px;
      --title-left: 110px;
      --title-width: 680px;

      /* posição da imagem */
      --image-top: 430px;
      --image-left: 90px;
      --image-width: 720px;
      --image-height: 350px;

      /* posição do texto */
      --text-top: 845px;
      --text-left: 80px;
      --text-width: 740px;
      --text-height: 360px;
    }

    *{
      box-sizing: border-box;
    }

    body{
      margin: 0;
      padding: 24px;
      background: #1a1a1a;
      font-family: Georgia, "Times New Roman", serif;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .toolbar{
      width: min(100%, 1100px);
      background: #f3f3f3;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .control{
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control label{
      font-size: 14px;
      font-weight: 700;
    }

    .control input[type="text"],
    .control input[type="file"],
    .control textarea,
    .control input[type="range"]{
      width: 100%;
    }

    .control textarea{
      min-height: 120px;
      resize: vertical;
      padding: 10px;
      font-size: 14px;
    }

    .control input[type="text"]{
      padding: 10px;
      font-size: 14px;
    }

    .page-wrap{
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .page{
      position: relative;
      width: var(--page-width);
      height: var(--page-height);
      background: url("jornal.png") center center / cover no-repeat;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
      overflow: hidden;
    }

    .headline{
      position: absolute;
      top: var(--title-top);
      left: var(--title-left);
      width: var(--title-width);
      text-align: center;
      font-family: "Times New Roman", Georgia, serif;
      font-weight: 700;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 0.5px;
      color: #111;
      text-transform: uppercase;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      overflow: hidden;
    }

    .headline[contenteditable="true"]:empty::before{
      content: "DIGITE O TÍTULO AQUI";
      color: rgba(0,0,0,.45);
    }

    .photo-frame{
      position: absolute;
      top: var(--image-top);
      left: var(--image-left);
      width: var(--image-width);
      height: var(--image-height);
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-frame img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      filter: sepia(0%);
    }

    .photo-placeholder{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(0,0,0,.2);
      color: rgba(0,0,0,.4);
      font-size: 18px;
      text-align: center;
      padding: 20px;
    }

    .article-text{
      position: absolute;
      top: var(--text-top);
      left: var(--text-left);
      width: var(--text-width);
      height: var(--text-height);

      font-size: 23px;
      line-height: 1.55;
      color: #111;
      text-align: justify;

      column-count: 2;
      column-gap: 34px;
      column-fill: auto;

      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .article-text[contenteditable="true"]:empty::before{
      content: "Digite o texto da matéria aqui...";
      color: rgba(0,0,0,.45);
    }

    .hint{
      width: min(100%, 1100px);
      color: #ddd;
      font-size: 14px;
      text-align: center;
    }

    button{
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover{
      opacity: .9;
    }

    @media (max-width: 980px){
      body{
        padding: 12px;
      }

      .page{
        transform: scale(.8);
        transform-origin: top center;
        margin-bottom: -280px;
      }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="control">
      <label for="tituloInput">Título</label>
      <input type="text" id="tituloInput" placeholder="Digite o título da matéria">
    </div>

    <div class="control">
      <label for="imagemInput">Escolher imagem</label>
      <input type="file" id="imagemInput" accept="image/*">
    </div>

    <div class="control">
      <label for="sepiaRange">Filtro sépia da imagem</label>
      <input type="range" id="sepiaRange" min="0" max="100" value="0">
    </div>

    <div class="control">
      <label for="textoInput">Texto da matéria</label>
      <textarea id="textoInput" placeholder="Escreva a notícia aqui..."></textarea>
    </div>

    <div class="control">
      <label>Ações</label>
      <button id="limparImagem">Remover imagem</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="page">
      <div id="headline" class="headline" contenteditable="true"></div>

      <div class="photo-frame">
        <div id="placeholder" class="photo-placeholder">
          Espaço para imagem
        </div>
        <img id="previewImage" alt="Imagem da matéria">
      </div>

      <div id="articleText" class="article-text" contenteditable="true"></div>
    </div>
  </div>

  <div class="hint">
    Coloque o arquivo <strong>jornal.png</strong> na mesma pasta deste HTML.
  </div>

  <script>
    const tituloInput = document.getElementById("tituloInput");
    const textoInput = document.getElementById("textoInput");
    const imagemInput = document.getElementById("imagemInput");
    const sepiaRange = document.getElementById("sepiaRange");
    const previewImage = document.getElementById("previewImage");
    const placeholder = document.getElementById("placeholder");
    const headline = document.getElementById("headline");
    const articleText = document.getElementById("articleText");
    const limparImagem = document.getElementById("limparImagem");

    tituloInput.addEventListener("input", () => {
      headline.textContent = tituloInput.value;
    });

    textoInput.addEventListener("input", () => {
      articleText.textContent = textoInput.value;
    });

    headline.addEventListener("input", () => {
      tituloInput.value = headline.textContent.trim();
    });

    articleText.addEventListener("input", () => {
      textoInput.value = articleText.textContent;
    });

    imagemInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        previewImage.style.display = "block";
        placeholder.style.display = "none";
      };
      reader.readAsDataURL(file);
    });

    sepiaRange.addEventListener("input", () => {
      previewImage.style.filter = `sepia(${sepiaRange.value}%)`;
    });

    limparImagem.addEventListener("click", () => {
      previewImage.src = "";
      previewImage.style.display = "none";
      placeholder.style.display = "flex";
      imagemInput.value = "";
    });
  </script>

</body>
</html>
