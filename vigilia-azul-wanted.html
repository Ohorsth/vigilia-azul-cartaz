```html
<!doctype html>
<html lang="pt-br">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VIGÍLIA AZUL — CARTAZ DE INTERVENÇÃO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

:root{
--panel:#0f1a2d;
--panel2:#0b1426;
--stroke:rgba(255,255,255,.12);
--txt:#e9edf3;
}

body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:var(--txt);
display:flex;
min-height:100vh;
}

.wrap{
width:min(1280px,96vw);
margin:24px auto;
display:grid;
grid-template-columns:420px 1fr;
gap:18px;
}

.panel{
background:var(--panel);
border-radius:16px;
padding:16px;
}

label{
display:block;
font-size:12px;
margin:10px 0 6px;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--stroke);
background:var(--panel2);
color:white;
text-transform:uppercase;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btns{
display:flex;
gap:10px;
margin-top:14px;
}

button{
flex:1;
padding:11px;
border-radius:12px;
border:1px solid var(--stroke);
background:#1b3a5a;
color:#fff;
font-weight:800;
cursor:pointer;
}

.preview{
display:flex;
justify-content:center;
padding:14px;
}

canvas{
width:min(720px,98%);
height:auto;
border-radius:14px;
cursor:grab;
}

</style>
</head>

<body>

<div class="wrap">

<div class="panel">

<label>IMAGEM DO PERSONAGEM</label>
<input id="portrait" type="file">

<label>ZOOM</label>
<input id="zoom" type="range" min="0.4" max="3" step="0.01" value="1">

<label>ROTAÇÃO</label>
<input id="rot" type="range" min="-180" max="180" step="1" value="0">

<div class="btns">
<button id="centerImg">CENTRALIZAR</button>
<button id="resetImg">RESETAR</button>
</div>

<label>NOME</label>
<input id="name">

<label>ALCUNHA</label>
<input id="alias">

<div class="row">

<div>
<label>STATUS</label>
<select id="status">
<option>PROCURADO</option>
<option>CAPTURA AUTORIZADA</option>
<option>NEUTRALIZAÇÃO PERMITIDA</option>
<option>INTERVENÇÃO IMEDIATA</option>
</select>
</div>

<div>
<label>ÚLTIMA REGIÃO</label>
<input id="region">
</div>

</div>

<div class="row">

<div>
<label>RECOMPENSA</label>
<input id="bounty">
</div>

<div>
<label>MOEDA</label>
<select id="currency">
<option value="">฿</option>
<option value="B$">B$</option>
</select>
</div>

</div>

<div class="btns">
<button id="render">ATUALIZAR</button>
<button id="download">BAIXAR PNG</button>
</div>

<div class="btns">
<button onclick="window.location.href='index.html'">VOLTAR AO MENU</button>
</div>

</div>

<div class="panel preview">
<canvas id="c" width="1536" height="2048"></canvas>
</div>

</div>

<script>

const $ = id=>document.getElementById(id)
const canvas = $("c")
const ctx = canvas.getContext("2d")

let portraitImg = null

const templateImg = new Image()
templateImg.src = "TempleteVigiliaAzul.png"

const imgState = {
x:0,
y:0,
scale:1,
rot:0
}

templateImg.onload = ()=>render()

function formatBounty(n){

const raw = String(n).replace(/[^\d]/g,'')
if(!raw) return ""

return raw.replace(/\B(?=(\d{3})+(?!\d))/g,".")

}

function upper(text){
return (text || "").toUpperCase()
}

function getPhotoRect(){

return{
x:canvas.width*0.16,
y:canvas.height*0.23,
w:canvas.width*0.68,
h:canvas.height*0.43
}

}

function drawPortrait(){

if(!portraitImg) return

const rect=getPhotoRect()

const cx=rect.x+rect.w/2
const cy=rect.y+rect.h/2

ctx.save()

ctx.beginPath()
ctx.rect(rect.x,rect.y,rect.w,rect.h)
ctx.clip()

ctx.translate(cx+imgState.x,cy+imgState.y)
ctx.rotate(imgState.rot*Math.PI/180)
ctx.scale(imgState.scale,imgState.scale)

ctx.drawImage(portraitImg,-rect.w/2,-rect.h/2,rect.w,rect.h)

ctx.restore()

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPortrait()

ctx.drawImage(templateImg,0,0,canvas.width,canvas.height)

ctx.fillStyle="#0b1a24"
ctx.textAlign="left"

ctx.font='700 '+Math.round(canvas.height*0.028)+'px "Libre Baskerville", serif'

ctx.fillText(upper($("name").value), canvas.width*0.22, canvas.height*0.63)
ctx.fillText(upper($("alias").value), canvas.width*0.263, canvas.height*0.665)
ctx.fillText(upper($("status").value), canvas.width*0.23, canvas.height*0.70)
ctx.fillText(upper($("region").value), canvas.width*0.54, canvas.height*0.73)

ctx.font='700 '+Math.round(canvas.height*0.045)+'px "Playfair Display", serif'

const reward = upper($("currency").value+" "+formatBounty($("bounty").value))

ctx.fillText(reward, canvas.width*0.2, canvas.height*0.831)

}

$("portrait").onchange=e=>{

const file=e.target.files[0]
if(!file)return

const url=URL.createObjectURL(file)

portraitImg=new Image()
portraitImg.onload=()=>render()
portraitImg.src=url

}

$("zoom").oninput=e=>{
imgState.scale=parseFloat(e.target.value)
render()
}

$("rot").oninput=e=>{
imgState.rot=parseFloat(e.target.value)
render()
}

$("centerImg").onclick=()=>{
imgState.x=0
imgState.y=0
render()
}

$("resetImg").onclick=()=>{
imgState.x=0
imgState.y=0
imgState.scale=1
imgState.rot=0
$("zoom").value=1
$("rot").value=0
render()
}

let dragging=false

canvas.onmousedown=()=>dragging=true
window.onmouseup=()=>dragging=false

window.onmousemove=e=>{
if(!dragging) return
imgState.x+=e.movementX*2
imgState.y+=e.movementY*2
render()
}

$("render").onclick=render

$("download").onclick=()=>{

render()

const link=document.createElement("a")
link.download="VIGILIA-AZUL-CARTAZ.png"
link.href=canvas.toDataURL("image/png")
link.click()

}

["name","alias","region","bounty","status","currency"].forEach(id=>{
$(id).addEventListener("input",render)
})

</script>

</body>
</html>
```
